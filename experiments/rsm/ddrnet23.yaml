CUDNN:
  BENCHMARK: true
  DETERMINISTIC: false
  ENABLED: true
GPUS: (0,)
OUTPUT_DIR: 'rsm_ddrnet23_output'
LOG_DIR: 'log'
WORKERS: 4
PRINT_FREQ: 10

DATASET:
  DATASET: rsm
  ROOT: data/
  TEST_SET: 'list/rsm/t_RSMdataset_v2.lst'
  TRAIN_SET: 'list/rsm/train_RSMdataset_v2.lst'
  NUM_CLASSES: 4
MODEL:
  NAME: ddrnet_23
  NUM_OUTPUTS: 2
  PRETRAINED: "pretrained_models/DDRNet23_cityscapes.pth"
  ALIGN_CORNERS: false
LOSS:
  USE_OHEM: true
  OHEMTHRES: 0.9
  OHEMKEEP: 131072
  BALANCE_WEIGHTS: [1, 0.4]
TRAIN:
  IMAGE_SIZE:
  - 1024
  - 1024
  BASE_SIZE: 2048
  BATCH_SIZE_PER_GPU: 12
  SHUFFLE: true
  BEGIN_EPOCH: 0
  END_EPOCH: 484
  RESUME: false
  OPTIMIZER: sgd
  LR: 0.01
  WD: 0.0005
  MOMENTUM: 0.9
  NESTEROV: false
  FLIP: true
  MULTI_SCALE: true
  DOWNSAMPLERATE: 1
  IGNORE_LABEL: 255
  SCALE_FACTOR: 16
TEST:
  IMAGE_SIZE:
  - 2048
  - 1024
  BASE_SIZE: 2048
  BATCH_SIZE_PER_GPU: 4
  FLIP_TEST: true
  MULTI_SCALE: false
  # MODEL_FILE: "pretrained_models/best_val.pth"
  OUTPUT_INDEX: 1